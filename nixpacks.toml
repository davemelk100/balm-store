# Nixpacks build config for the consolidated Railway service.
# This service serves both the FastAPI backend and the built Vite SPA.

[phases.setup]
nixPkgs = ["python311", "nodejs_20", "gcc"]

[phases.install]
cmds = [
    "python -m venv --copies /opt/venv",
    ". /opt/venv/bin/activate && pip install -r backend/requirements.txt",
    "cd frontend && npm ci",
]

[phases.build]
cmds = [
    "cd frontend && npm run build",
]

[start]
cmd = ". /opt/venv/bin/activate && cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
