<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load Google Fonts non-blocking. The print-media trick makes the
         browser skip render-blocking on this stylesheet, then onload
         swaps it in. Combined with display=swap, the page paints with
         a fallback font and upgrades to New Amsterdam when ready. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=New+Amsterdam&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=New+Amsterdam&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=New+Amsterdam&display=swap"
      />
    </noscript>
    <title>Balm Products and Services</title>
    <meta
      name="description"
      content="Balm Products and Services — a multidisciplinary creative house for underground music, streetwear, and physical-media art. Independent record label, clothing imprint, and artist collective."
    />
    <meta property="og:title" content="Balm Products and Services" />
    <meta property="og:description" content="A multidisciplinary creative house for underground music, streetwear, and physical-media art." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://balmsoothes.com/" />
    <meta property="og:image" content="https://balmsoothes.com/og-img.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="BALM" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Balm Products and Services" />
    <meta name="twitter:description" content="A multidisciplinary creative house for underground music, streetwear, and physical-media art." />
    <meta name="twitter:image" content="https://balmsoothes.com/og-img.png" />
    <meta name="twitter:image:alt" content="BALM" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
